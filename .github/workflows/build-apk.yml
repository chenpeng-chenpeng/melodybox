name: Build APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          # Check what's already installed
          echo "=== Pre-installed SDK ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null || echo "no platforms"
          ls $ANDROID_HOME/build-tools/ 2>/dev/null || echo "no build-tools"
          # Install missing packages (use the preinstalled one if available)
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --list 2>/dev/null | grep "platforms;android" | head -5 || true
          # Accept licenses
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          # Install only if not present
          if [ ! -d "$ANDROID_HOME/platforms/android-34" ]; then
            echo "Installing android-34 platform..."
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" --no_https 2>/dev/null || \
            $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" 2>/dev/null || true
          fi
          echo "=== Installed SDK ==="
          ls $ANDROID_HOME/platforms/ 2>/dev/null
          ls $ANDROID_HOME/build-tools/ 2>/dev/null

      - name: Install npm dependencies
        run: npm install

      - name: Init Capacitor Android
        run: npx cap add android

      - name: Sync web assets
        run: npx cap sync android

      - name: Build debug APK
        run: cd android && chmod +x gradlew && ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MelodyBox-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
